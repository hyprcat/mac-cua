<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="cursor-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#6366f1" flood-opacity="0.4"/>
    </filter>
    <filter id="pulse-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="url(#bg)" stroke="#334155" stroke-width="1.5"/>

  <!-- Subtle ring -->
  <circle cx="60" cy="60" r="48" fill="none" stroke="#334155" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.5"/>

  <!-- Ghost cursor (main icon) - slightly transparent to convey "background" -->
  <g filter="shadow" opacity="0.85">
    <!-- Cursor arrow -->
    <path d="M 42 30 L 42 72 L 52 62 L 66 80 L 72 76 L 58 58 L 72 52 Z"
          fill="url(#cursor-fill)" stroke="#e2e8f0" stroke-width="1" stroke-linejoin="round"/>
  </g>

  <!-- Stealth lines radiating out - "working in background" -->
  <g opacity="0.6" stroke="url(#glow)" stroke-width="1.5" stroke-linecap="round">
    <line x1="78" y1="38" x2="88" y2="32"/>
    <line x1="82" y1="48" x2="94" y2="46"/>
    <line x1="80" y1="58" x2="92" y2="60"/>
  </g>

  <!-- Small pulse dots -->
  <circle cx="90" cy="31" r="2" fill="#818cf8" opacity="0.8" filter="url(#pulse-glow)"/>
  <circle cx="96" cy="45" r="1.5" fill="#818cf8" opacity="0.6"/>
  <circle cx="94" cy="60" r="1.5" fill="#818cf8" opacity="0.5"/>
</svg>
